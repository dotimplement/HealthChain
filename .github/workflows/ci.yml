# This workflow installs Python dependencies and runs the narrow architecture and
# contract gate for HealthChain.

name: ci

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    types: [opened, synchronize, reopened, ready_for_review]


jobs:
  contract-gate:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev --python 3.12

      - name: Lint with Ruff
        run: |
          uv run --python 3.12 ruff format --check
          uv run --python 3.12 ruff check
        continue-on-error: true

      - name: Run reviewed boundary and contract gate
        run: >
          uv run --python 3.12 pytest
          tests/test_ci_contract_gate.py
          tests/gateway/test_api_app.py
